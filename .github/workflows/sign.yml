name: Quark Daily Sign

on:
  schedule:
    - cron: '0 1 * * *' # 每天北京时间上午 9 点自动执行
  workflow_dispatch: # 这个按钮允许我们手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run Sign Script
        env:
          QUARK_COOKIE: ${{ secrets.QUARK_COOKIE }}
        run: python sign.py
